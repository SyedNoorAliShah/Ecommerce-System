<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        nav { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 20px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cart-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 15px; display: flex; align-items: center; gap: 8px; transition: transform 0.2s; }
        .cart-btn:hover { transform: scale(1.05); }
        .badge { background: #ff4757; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .hero { text-align: center; padding: 60px 20px 40px; background: linear-gradient(135deg, #0f0f1a, #1a1a2e); }
        .hero h1 { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .hero p { color: #888; font-size: 18px; }
        .section-title { text-align: center; font-size: 28px; font-weight: 700; margin: 40px 0 20px; color: #fff; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px 40px 60px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 30px; text-align: center; border: 1px solid rgba(102,126,234,0.2); transition: transform 0.3s, box-shadow 0.3s; position: relative; overflow: hidden; }
        .product-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(102,126,234,0.2); }
        .product-img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); padding: 15px; }
        .product-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .product-price { font-size: 28px; font-weight: 800; color: #667eea; margin-bottom: 20px; }
        .add-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 15px; font-weight: 600; width: 100%; transition: all 0.3s; }
        .add-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .add-btn.added { background: linear-gradient(135deg, #2ed573, #1e90ff); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
        .modal { background: #1a1a2e; border-radius: 20px; padding: 35px; width: 90%; max-width: 500px; border: 1px solid rgba(102,126,234,0.3); max-height: 80vh; overflow-y: auto; }
        .modal h2 { font-size: 24px; margin-bottom: 20px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cart-item-name { font-weight: 600; }
        .cart-item-price { color: #667eea; font-weight: 700; }
        .cart-total { font-size: 22px; font-weight: 800; text-align: right; margin: 20px 0; color: #fff; }
        .cart-total span { color: #667eea; }
        .checkout-btn { background: linear-gradient(135deg, #2ed573, #1e90ff); border: none; color: white; padding: 15px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: all 0.3s; }
        .checkout-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .close-btn { float: right; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        .empty-cart { text-align: center; color: #888; padding: 30px; font-size: 16px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, #2ed573, #1e90ff); color: white; padding: 15px 25px; border-radius: 15px; font-weight: 600; z-index: 999; transform: translateX(200px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .success-msg { text-align: center; padding: 20px; color: #2ed573; font-size: 18px; font-weight: 700; display: none; }
    </style>
</head>
<body>
<nav>
    <div class="logo">ShopZone</div>
    <button class="cart-btn" onclick="openCart()">Cart <span class="badge" id="cart-count">0</span></button>
</nav>
<div class="hero">
    <h1>Premium Store</h1>
    <p>Discover amazing products at unbeatable prices</p>
</div>
<h2 class="section-title">Featured Products</h2>
<div class="products-grid" id="products-grid"></div>
<div class="modal-overlay" id="cart-modal">
    <div class="modal">
        <button class="close-btn" onclick="closeCart()">X</button>
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total" id="cart-total"></div>
        <div class="success-msg" id="success-msg">Order Placed Successfully!</div>
        <button class="checkout-btn" id="checkout-btn" onclick="checkout()">Checkout Now</button>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
    const images = {
        "Laptop": "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=300&q=80",
        "Phone": "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=300&q=80",
        "Headphones": "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&q=80"
    };
    let cartItems = [];
    async function loadProducts() {
        const res = await fetch("/products");
        const products = await res.json();
        const grid = document.getElementById("products-grid");
        grid.innerHTML = products.map(p => "<div class='product-card'><img class='product-img' src='" + (images[p.name] || 'https://via.placeholder.com/140') + "' alt='" + p.name + "'><div class='product-name'>" + p.name + "</div><div class='product-price'>$" + p.price + "</div><button class='add-btn' id='btn-" + p.id + "' onclick='addToCart(" + p.id + ", \"" + p.name + "\", " + p.price + ")'>Add to Cart</button></div>").join("");
    }
    async function addToCart(id, name, price) {
        await fetch("/cart/" + id, { method: "POST" });
        cartItems.push({ id, name, price });
        document.getElementById("cart-count").textContent = cartItems.length;
        const btn = document.getElementById("btn-" + id);
        btn.textContent = "Added!";
        btn.classList.add("added");
        setTimeout(() => { btn.textContent = "Add to Cart"; btn.classList.remove("added"); }, 1500);
        showToast(name + " added to cart!");
    }
    function openCart() {
        document.getElementById("cart-modal").classList.add("active");
        const itemsDiv = document.getElementById("cart-items");
        if (cartItems.length === 0) {
            itemsDiv.innerHTML = "<div class='empty-cart'>Your cart is empty!</div>";
            document.getElementById("cart-total").innerHTML = "";
            document.getElementById("checkout-btn").style.display = "none";
        } else {
            itemsDiv.innerHTML = cartItems.map(i => "<div class='cart-item'><span class='cart-item-name'>" + i.name + "</span><span class='cart-item-price'>$" + i.price + "</span></div>").join("");
            const total = cartItems.reduce((s, i) => s + i.price, 0);
            document.getElementById("cart-total").innerHTML = "Total: <span>$" + total.toFixed(2) + "</span>";
            document.getElementById("checkout-btn").style.display = "block";
        }
        document.getElementById("success-msg").style.display = "none";
    }
    function closeCart() { document.getElementById("cart-modal").classList.remove("active"); }
    async function checkout() {
        await fetch("/checkout", { method: "POST" });
        cartItems = [];
        document.getElementById("cart-count").textContent = 0;
        document.getElementById("cart-items").innerHTML = "";
        document.getElementById("cart-total").innerHTML = "";
        document.getElementById("checkout-btn").style.display = "none";
        document.getElementById("success-msg").style.display = "block";
        showToast("Order placed!");
    }
    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }
    loadProducts();
</script>
</body>
</html>
